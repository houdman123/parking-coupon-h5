<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <title>停车券扣费工具</title>
  <link rel="stylesheet" href="./styles.css?v=20260420v3" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>停车券扣费工具</h1>
        <div class="sub">微信 H5 测试版</div>
      </div>
      <div class="version">v2026.04.20-3</div>
    </header>

    <nav class="tabs">
      <button class="tab-btn active" data-tab="home">扣费</button>
      <button class="tab-btn" data-tab="accounts">账号</button>
      <button class="tab-btn" data-tab="records">记录</button>
      <button class="tab-btn" data-tab="summary">月报</button>
    </nav>

    <main>
      <section class="tab-panel active" id="tab-home">
        <div class="card stats">
          <div class="stat-item">
            <div class="label">正常账号数</div>
            <div class="value" id="activeAccountCount">0</div>
          </div>
          <div class="stat-item">
            <div class="label">总剩余券数</div>
            <div class="value" id="totalCoupons">0</div>
          </div>
          <div class="stat-item">
            <div class="label">本月抵扣金额</div>
            <div class="value" id="monthDeductAmount">0元</div>
          </div>
        </div>

        <div class="card">
          <div class="section-title">输入金额</div>
          <div class="quick-grid" id="quickAmountGrid">
            <button class="quick-btn" data-amount="5">5元</button>
            <button class="quick-btn" data-amount="10">10元</button>
            <button class="quick-btn" data-amount="15">15元</button>
            <button class="quick-btn" data-amount="20">20元</button>
            <button class="quick-btn" data-amount="25">25元</button>
          </div>
          <div class="field">
            <label for="customAmount">自定义金额（5 的倍数）</label>
            <input id="customAmount" type="number" inputmode="numeric" min="0" step="5" placeholder="例如 30 / 75 / 100" />
          </div>
          <div class="selected-amount" id="selectedAmountText">当前未选择金额</div>
          <div class="btn-row">
            <button class="btn secondary" id="btnPreview">查看扣费方案</button>
            <button class="btn primary" id="btnExecute">确认并执行</button>
          </div>
          <div class="hint">流程：输入金额 → 查看方案 → 确认 → 执行。不会一点击就直接扣费。</div>
        </div>

        <div class="card" id="planCard">
          <div class="section-title">本次扣费方案</div>
          <div id="planEmpty" class="empty">还没有生成方案</div>
          <div id="planContent" class="hidden"></div>
        </div>
      </section>

      <section class="tab-panel" id="tab-accounts">
        <div class="card">
          <div class="section-title">新增 / 编辑账号</div>
          <div class="field">
            <label for="accountName">账号备注名</label>
            <input id="accountName" type="text" placeholder="例如：A账号 / 张三账号" />
          </div>
          <div class="field-row">
            <div class="field half">
              <label for="accountCoupons">本月剩余券数</label>
              <input id="accountCoupons" type="number" inputmode="numeric" min="0" step="1" placeholder="默认30" />
            </div>
            <div class="field half">
              <label for="accountStatus">状态</label>
              <select id="accountStatus">
                <option value="normal">正常</option>
                <option value="disabled">停用</option>
              </select>
            </div>
          </div>
          <div class="btn-row">
            <button class="btn secondary" id="btnResetForm">清空</button>
            <button class="btn primary" id="btnSaveAccount">保存账号</button>
          </div>
          <div class="hint">这版先不保存真实账号密码，只管理券数和扣费逻辑。</div>
        </div>

        <div class="card">
          <div class="section-title">账号列表</div>
          <div id="accountList" class="list"></div>
        </div>
      </section>

      <section class="tab-panel" id="tab-records">
        <div class="card">
          <div class="section-title">扣费记录</div>
          <div id="recordList" class="list"></div>
        </div>
      </section>

      <section class="tab-panel" id="tab-summary">
        <div class="card">
          <div class="section-title">本月汇总</div>
          <div id="summaryBox"></div>
          <div class="btn-row top-gap">
            <button class="btn danger" id="btnResetMonth">月度清零</button>
            <button class="btn secondary" id="btnExportData">导出数据</button>
          </div>
          <div class="hint">月度清零会把剩余券作废并把本月记录归档到本地浏览器存储。</div>
        </div>
      </section>
    </main>
  </div>

  <script src="./app.js?v=20260420v3" defer></script>
</body>
</html>
